version: '3.9'

services:
  # ─────────────────────────────────────────
  # Base de datos PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taller_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taller_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taller_pass}
      POSTGRES_DB: ${POSTGRES_DB:-taller_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taller_user} -d ${POSTGRES_DB:-taller_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Backend Node.js + Express
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taller_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-taller_user}:${POSTGRES_PASSWORD:-taller_pass}@postgres:5432/${POSTGRES_DB:-taller_db}
      JWT_SECRET: ${JWT_SECRET:-supersecreto_cambiar_en_produccion}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: >
      sh -c "npx prisma@5 db push && node src/interfaces/http/server.js"

  # ─────────────────────────────────────────
  # pgAdmin (administración visual de la BD)
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: taller_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@taller.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # ─────────────────────────────────────────
  # Frontend React (Vite)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taller_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # URL del API Backend (usado si el container construye o el runtime lo detecta)
      VITE_API_URL: http://localhost:3000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
    name: taller_postgres_data

networks:
  default:
    name: taller_network
